spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlite:./taskmanager.db}
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:ZGVsdGEtdGFzay1tYW5hZ2VyLXN1cGVyLXNlY3JldC1rZXktMjAyNS0wMDAwMDA=}
  expiration: ${JWT_EXPIRATION:86400000}

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operationsSorter: method
